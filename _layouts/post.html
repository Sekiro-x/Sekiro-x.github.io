<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Sekiro's Blog</title>
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .post-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .post-content h1, .post-content h2, .post-content h3 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: #333;
        }
        .post-content p {
            margin-bottom: 1rem;
            line-height: 1.8;
        }
        .post-content ul, .post-content ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }
        .post-content code {
            background-color: #f4f4f4;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        .post-content pre {
            background-color: #f4f4f4;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ '/' | relative_url }}" class="nav-item">主页</a>
            <a href="{{ '/memo' | relative_url }}" class="nav-item">备忘录</a>
            <a href="{{ '/comments' | relative_url }}" class="nav-item">评论</a>
        </div>
    </nav>

    <!-- 文章内容 -->
    <div class="main-container" style="grid-template-columns: 1fr;">
        <article class="content">
            <div class="post-content">
                <a href="{{ '/' | relative_url }}" class="back-link">← 返回主页</a>
                
                <h1>{{ page.title }}</h1>
                
                <div class="post-meta" style="margin-bottom: 2rem;">
                    <span><i class="far fa-calendar-alt"></i> {{ page.date | date: "%Y-%m-%d" }}</span>
                    {% if page.categories %}
                    <span style="margin-left: 1rem;">
                        <i class="fas fa-folder"></i> 
                        {% for category in page.categories %}
                            {{ category }}{% unless forloop.last %}, {% endunless %}
                        {% endfor %}
                    </span>
                    {% endif %}
                </div>

                {{ content }}
            </div>
        </article>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; {{ 'now' | date: "%Y" }} Sekiro. All rights reserved.</p>
    </footer>
</body>
</html>
