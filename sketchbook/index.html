<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sekiro - 技术</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', 'Times New Roman', serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 20px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-link { color: #333; text-decoration: none; font-weight: 500; padding: 0.5rem 1.2rem; border-radius: 25px; transition: all 0.3s ease; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: translateY(-2px); }
        .main-container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; display: grid; grid-template-columns: 320px 1fr; gap: 2.5rem; }
        .sidebar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); height: fit-content; position: sticky; top: 100px; }
        .profile-section { text-align: center; }
        .user-id { font-size: 2.2rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; font-weight: bold; }
        .user-title { color: #666; font-size: 1rem; margin-bottom: 2rem; font-style: italic; }
        .social-links { display: flex; flex-direction: column; gap: 1rem; }
        .social-link { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; color: #667eea; text-decoration: none; border-radius: 12px; transition: all 0.3s ease; background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%); border: 2px solid transparent; }
        .social-link:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: translateX(8px); border-color: rgba(255,255,255,0.3); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .social-icon { font-size: 1.5rem; width: 30px; text-align: center; }
        .content { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 3rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .section-header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 3px solid; border-image: linear-gradient(to right, #667eea, #764ba2) 1; }
        .section-title { font-size: 2.5rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
        .section-subtitle { color: #666; font-size: 1.1rem; }
        .article-list { display: flex; flex-direction: column; gap: 1rem; }
        .article-card { display: block; text-decoration: none; padding: 1.2rem 1.5rem; background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%); border-radius: 12px; border: 1px solid rgba(102,126,234,0.1); transition: all 0.3s ease; position: relative; overflow: hidden; }
        .article-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); opacity: 0; transition: opacity 0.3s ease; }
        .article-card:hover { transform: translateX(6px); box-shadow: 0 6px 20px rgba(102,126,234,0.2); border-color: rgba(102,126,234,0.3); }
        .article-card:hover::before { opacity: 1; }
        .article-card-title { font-size: 1.1rem; color: #333; font-weight: 600; margin-bottom: 0.4rem; }
        .article-card-date { font-size: 0.85rem; color: #999; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; }
        .page-btn { padding: 0.5rem 1.2rem; color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%); border: 1px solid rgba(102,126,234,0.2); border-radius: 25px; cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease; text-decoration: none; }
        .page-btn:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: translateY(-2px); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }
        .page-info { color: #999; font-size: 0.9rem; }
        .footer { text-align: center; padding: 2.5rem; color: white; margin-top: 3rem; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .footer p { font-size: 1rem; opacity: 0.9; }
        @media (max-width: 968px) { .main-container { grid-template-columns: 1fr; padding: 0 1rem; } .sidebar { position: static; } .nav-container { flex-direction: column; gap: 1rem; } }
        @media (max-width: 600px) { .section-title { font-size: 2rem; } .user-id { font-size: 1.8rem; } .avatar { width: 150px; height: 150px; } }
        .avatar-container { position: relative; margin-bottom: 2rem; }
        .avatar { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 5px solid transparent; background: linear-gradient(white, white), linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-origin: border-box; background-clip: content-box, border-box; box-shadow: 0 8px 30px rgba(102,126,234,0.4); transition: transform 0.3s ease; cursor: pointer; }
        .avatar:hover { transform: scale(1.05); }
        .avatar.playing { animation: spin 8s linear infinite; }
        .avatar.playing:hover { animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .music-indicator { position: absolute; bottom: 8px; right: 8px; width: 32px; height: 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(102,126,234,0.5); opacity: 0; transition: opacity 0.3s ease; }
        .music-indicator.visible { opacity: 1; }
        .music-indicator svg { width: 16px; height: 16px; fill: white; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop preload="auto">
        <source src="../assets/clair-de-lune.mp3" type="audio/mpeg">
    </audio>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-links">
                <a href="../" class="nav-link">主页</a>
                <a href="../sketchbook/" class="nav-link active">技术</a>
                <a href="../notes/" class="nav-link">笔记</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <div class="profile-section">
                <div class="avatar-container">
                    <img src="../assets/Houtarou.jpg" alt="Sekiro's Avatar" class="avatar" id="avatar" title="点击播放/暂停音乐">
                    <div class="music-indicator" id="musicIndicator">
                        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    </div>
                </div>
                <h1 class="user-id">Sekiro</h1>
                <p class="user-title">推荐算法</p>
                <div class="social-links">
                    <a href="https://github.com/Sekiro-x" target="_blank" class="social-link">
                        <span class="social-icon"><svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></span>
                        <span>GitHub</span>
                    </a>
                    <a href="https://space.bilibili.com/21989316" target="_blank" class="social-link">
                        <span class="social-icon"><svg height="24" width="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.813 4.653h.854c1.51.054 2.769.578 3.773 1.574 1.004.995 1.524 2.249 1.56 3.76v7.36c-.036 1.51-.556 2.769-1.56 3.773s-2.262 1.524-3.773 1.56H5.333c-1.51-.036-2.769-.556-3.773-1.56S.036 18.858 0 17.347v-7.36c.036-1.511.556-2.765 1.56-3.76 1.004-.996 2.262-1.52 3.773-1.574h.774l-1.174-1.12a1.234 1.234 0 0 1-.373-.906c0-.356.124-.658.373-.907l.027-.027c.267-.249.573-.373.92-.373.347 0 .653.124.92.373L9.653 4.44c.071.071.134.142.187.213h4.267a.836.836 0 0 1 .16-.213l2.853-2.747c.267-.249.573-.373.92-.373.347 0 .662.151.929.4.267.249.391.551.391.907 0 .355-.124.657-.373.906L17.813 4.653zM5.333 7.24c-.746.018-1.373.276-1.88.773-.506.498-.769 1.13-.786 1.894v7.52c.017.764.28 1.395.786 1.893.507.498 1.134.756 1.88.773h13.334c.746-.017 1.373-.275 1.88-.773.506-.498.769-1.129.786-1.893v-7.52c-.017-.765-.28-1.396-.786-1.894-.507-.497-1.134-.755-1.88-.773H5.333zM8 11.107c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373zm8 0c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373z"/></svg></span>
                        <span>Bilibili</span>
                    </a>
                </div>
            </div>
        </aside>

        <main class="content">
            <div class="section-header">
                <h2 class="section-title">技术</h2>
            </div>
            <div class="article-list" id="articleList"></div>
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Sekiro. All rights reserved. | BGM: Claude Debussy - Clair de Lune</p>
    </footer>

    <script>
        // ===== 文章数据(按日期降序排列) =====
        var articles = [
            { title: 'UV 指南', date: '2026-06-13', url: '202606/UV指南.md' }
        ];

        // ===== 分页逻辑 =====
        var perPage = 10;
        var currentPage = parseInt(new URLSearchParams(window.location.search).get('page')) || 1;
        var totalPages = Math.max(1, Math.ceil(articles.length / perPage));
        if (currentPage > totalPages) currentPage = totalPages;

        function renderArticles() {
            var list = document.getElementById('articleList');
            var start = (currentPage - 1) * perPage;
            var pageArticles = articles.slice(start, start + perPage);
            if (pageArticles.length === 0) {
                list.innerHTML = '<p class="empty-placeholder">暂无文章</p>';
                return;
            }
            list.innerHTML = pageArticles.map(function (a) {
                return '<a href="' + a.url + '" class="article-card">' +
                    '<div class="article-card-title">' + a.title + '</div>' +
                    '<div class="article-card-date">' + a.date + '</div></a>';
            }).join('');
        }

        function renderPagination() {
            var el = document.getElementById('pagination');
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            var prevClass = currentPage <= 1 ? 'page-btn disabled' : 'page-btn';
            var nextClass = currentPage >= totalPages ? 'page-btn disabled' : 'page-btn';
            var prevUrl = currentPage > 1 ? '?page=' + (currentPage - 1) : '#';
            var nextUrl = currentPage < totalPages ? '?page=' + (currentPage + 1) : '#';
            el.innerHTML =
                '<a href="' + prevUrl + '" class="' + prevClass + '">← 上一页</a>' +
                '<span class="page-info">' + currentPage + ' / ' + totalPages + '</span>' +
                '<a href="' + nextUrl + '" class="' + nextClass + '">下一页 →</a>';
        }

        renderArticles();
        renderPagination();

        // ===== 音乐控制 =====
        var music = document.getElementById('bgMusic');
        var avatar = document.getElementById('avatar');
        var indicator = document.getElementById('musicIndicator');
        music.volume = 0.4;

        function setPlayingUI(isPlaying) {
            if (isPlaying) {
                avatar.classList.add('playing');
                indicator.classList.add('visible');
            } else {
                avatar.classList.remove('playing');
                indicator.classList.remove('visible');
            }
        }

        // 跨页面音乐持久化
        var wasPlaying = localStorage.getItem('musicPlaying') === 'true';
        var savedTime = parseFloat(localStorage.getItem('musicTime') || '0');

        if (wasPlaying) {
            music.currentTime = savedTime;
            music.play().then(function () {
                setPlayingUI(true);
            }).catch(function () {});
        } else {
            var firstInteract = function () {
                music.play().then(function () {
                    setPlayingUI(true);
                    localStorage.setItem('musicPlaying', 'true');
                }).catch(function () {});
                ['mousemove', 'scroll', 'touchstart', 'keydown', 'click'].forEach(function (evt) {
                    document.removeEventListener(evt, firstInteract);
                });
            };
            ['mousemove', 'scroll', 'touchstart', 'keydown', 'click'].forEach(function (evt) {
                document.addEventListener(evt, firstInteract, { once: false });
            });
        }

        avatar.addEventListener('click', function (e) {
            e.stopPropagation();
            if (music.paused) {
                music.play().then(function () { setPlayingUI(true); });
            } else {
                music.pause();
                setPlayingUI(false);
            }
        });

        music.addEventListener('play', function () { localStorage.setItem('musicPlaying', 'true'); setPlayingUI(true); });
        music.addEventListener('pause', function () { localStorage.setItem('musicPlaying', 'false'); setPlayingUI(false); });
        music.addEventListener('timeupdate', function () { localStorage.setItem('musicTime', music.currentTime.toString()); });
    </script>
</body>
</html>
